server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "https://wattever.vercel.app"
              - "https://wattever-*.vercel.app"
              - "https://*.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: station-service
          uri: https://wattever-2.onrender.com
          predicates:
            - Path=/api/stations/**
        - id: rental-service
          uri: https://wattever-1.onrender.com
          predicates:
            - Path=/api/rentals/**
        - id: payment-service
          uri: https://wattever-3.onrender.com
          predicates:
            - Path=/api/payments/**
        - id: user-service
          uri: https://wattever-user.onrender.com
          predicates:
            - Path=/api/users/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://securetoken.google.com/wattever-131b9
          jwk-set-uri: https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com

management:
  endpoints:
    web:
      exposure:
        include: health,info
