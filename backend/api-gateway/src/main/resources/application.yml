server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: station-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/stations/**
        - id: rental-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/rentals/**
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payments/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
