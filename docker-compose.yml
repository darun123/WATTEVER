version: '3.8'

services:
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - station-service
      - rental-service
      - payment-service
    networks:
      - waterx-net

  station-service:
    build: ./backend/station-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - BAJIE_USERNAME=${BAJIE_USERNAME}
      - BAJIE_PASSWORD=${BAJIE_PASSWORD}
    networks:
      - waterx-net

  rental-service:
    build: ./backend/rental-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - BAJIE_USERNAME=${BAJIE_USERNAME}
      - BAJIE_PASSWORD=${BAJIE_PASSWORD}
    networks:
      - waterx-net

  payment-service:
    build: ./backend/payment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    networks:
      - waterx-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - waterx-net

networks:
  waterx-net:
    driver: bridge
